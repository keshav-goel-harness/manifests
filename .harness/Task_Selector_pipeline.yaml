pipeline:
  name: Task_Selector_pipeline
  identifier: Task_Selector_pipeline
  projectIdentifier: Keshav_project1
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: stage1
        identifier: stage1
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: task_selector_service
          environment:
            environmentRef: task_selector_env
            deployToAll: false
            infrastructureDefinitions:
              - identifier: task_selector_infra
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |+
                          # 1. Create a temporary file containing your secret's content
                          # Replace "my_gcp_json_key" with your actual Secret ID
                          echo '<+secrets.getValue("GCP_SECRET")>' > /tmp/gcp_creds.json

                          # 2. Set the environment variable to point to that file
                          export GOOGLE_APPLICATION_CREDENTIALS="/tmp/gcp_creds.json"

                          # 3. Verify the file is there (Optional, for peace of mind)
                          ls -l /tmp/gcp_creds.json

                          # 4. NOW run your actual test or script
                          # Example: ./run_my_qa_tests.sh

                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
            rollbackSteps:
              - step:
                  name: Rollback Rollout Deployment
                  identifier: rollbackRolloutDeployment
                  type: K8sRollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
